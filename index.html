<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeTrack Therappy Innovations Team</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0F4C81;
            --primary-light: #1E6BA8;
            --primary-dark: #0A3459;
            --accent: #D4A574;
            --accent-light: #E8C9A1;
            --accent-dark: #B8895C;
            --success: #2D7D5A;
            --success-light: #E8F5EE;
            --danger: #C73E1D;
            --danger-light: #FDE8E8;
            --warning: #E67E22;
            --warning-light: #FEF3E8;
            --info: #3498DB;
            --info-light: #EBF5FB;
            --bg-main: #F8F9FB;
            --bg-card: #FFFFFF;
            --text-primary: #1A202E;
            --text-secondary: #5A6678;
            --text-light: #8B95A8;
            --border: #E4E7ED;
            --border-light: #F0F2F5;
            --shadow-sm: 0 1px 3px rgba(15, 76, 129, 0.04);
            --shadow-md: 0 4px 12px rgba(15, 76, 129, 0.08);
            --shadow-lg: 0 12px 24px rgba(15, 76, 129, 0.12);
            --shadow-xl: 0 20px 40px rgba(15, 76, 129, 0.16);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #root {
            min-height: 100vh;
        }

        /* Login Page */
        .login-container {
            min-height: 100vh;
            display: flex;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--primary-light) 100%);
            position: relative;
            overflow: hidden;
        }

        .login-bg-shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 20s ease-in-out infinite;
        }

        .login-bg-shape:nth-child(1) {
            top: -20%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
        }

        .login-bg-shape:nth-child(2) {
            bottom: -30%;
            left: -15%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.05); }
        }

        .login-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .login-box {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 480px;
            box-shadow: var(--shadow-xl);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-logo h1 {
            font-family: 'Fraunces', serif;
            font-size: 2.5rem;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .login-logo p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: var(--bg-main);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--bg-card);
            box-shadow: 0 0 0 4px rgba(15, 76, 129, 0.1);
        }

        .btn {
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background: var(--bg-main);
            color: var(--text-primary);
            border: 2px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-card);
            border-color: var(--primary);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #256B4A;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #A63318;
        }

        /* Loading Spinner */
        .spinner {
            border: 3px solid var(--border-light);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
            gap: 1rem;
        }

        .loading-spinner {
            border: 4px solid var(--border-light);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 0.8s linear infinite;
        }

        /* Main App Layout */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .sidebar-header {
            padding: 2rem 1.5rem;
            border-bottom: 1px solid var(--border-light);
        }

        .sidebar-logo {
            font-family: 'Fraunces', serif;
            font-size: 1.75rem;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 0.25rem;
            letter-spacing: -0.02em;
        }

        .sidebar-subtitle {
            font-size: 0.8rem;
            color: var(--text-light);
        }

        .sidebar-nav {
            flex: 1;
            padding: 1.5rem 0;
            overflow-y: auto;
        }

        .nav-item {
            padding: 0.875rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: var(--bg-main);
            color: var(--primary);
        }

        .nav-item.active {
            background: linear-gradient(90deg, rgba(15, 76, 129, 0.08) 0%, transparent 100%);
            color: var(--primary);
            border-left-color: var(--primary);
            font-weight: 600;
        }

        .sidebar-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--border-light);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 0.875rem;
            padding: 0.75rem;
            background: var(--bg-main);
            border-radius: 12px;
            margin-bottom: 1rem;
        }

        .user-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1rem;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
        }

        .user-role {
            font-size: 0.75rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            background: var(--bg-main);
        }

        .main-header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: var(--shadow-sm);
        }

        .main-header h1 {
            font-family: 'Fraunces', serif;
            font-size: 2rem;
            color: var(--text-primary);
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .main-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 0.25rem;
        }

        .main-body {
            padding: 2rem;
            max-width: 1400px;
        }

        /* Dashboard Cards */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 1.75rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(15, 76, 129, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(30%, -30%);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .stat-icon.blue {
            background: rgba(15, 76, 129, 0.1);
            color: var(--primary);
        }

        .stat-icon.gold {
            background: rgba(212, 165, 116, 0.15);
            color: var(--accent-dark);
        }

        .stat-icon.green {
            background: var(--success-light);
            color: var(--success);
        }

        .stat-icon.red {
            background: var(--danger-light);
            color: var(--danger);
        }

        .stat-value {
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
            font-family: 'Fraunces', serif;
            letter-spacing: -0.02em;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Content Cards */
        .content-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            margin-bottom: 2rem;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-light);
        }

        .card-title {
            font-family: 'Fraunces', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        /* Time Clock Widget */
        .clock-widget {
            text-align: center;
            padding: 2rem;
        }

        .current-time {
            font-family: 'Fraunces', serif;
            font-size: 4rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .current-date {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .clock-form {
            max-width: 500px;
            margin: 0 auto;
        }

        .time-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        /* Table Styles */
        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        .data-table thead {
            background: var(--bg-main);
        }

        .data-table th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border);
        }

        .data-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-light);
            color: var(--text-primary);
        }

        .data-table tbody tr {
            transition: background 0.2s ease;
        }

        .data-table tbody tr:hover {
            background: var(--bg-main);
        }

        /* Status Badge */
        .status-badge {
            display: inline-block;
            padding: 0.375rem 0.875rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .status-badge.pending {
            background: var(--warning-light);
            color: var(--warning);
        }

        .status-badge.approved {
            background: var(--success-light);
            color: var(--success);
        }

        .status-badge.rejected {
            background: var(--danger-light);
            color: var(--danger);
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: var(--bg-main);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            background: var(--primary);
            color: white;
        }

        .icon-btn.danger:hover {
            background: var(--danger);
        }

        .icon-btn.success:hover {
            background: var(--success);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-xl);
            animation: slideUp 0.3s ease;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-light);
        }

        .modal-title {
            font-family: 'Fraunces', serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .close-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: none;
            background: var(--bg-main);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .close-btn:hover {
            background: var(--danger-light);
            color: var(--danger);
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        /* Alert Messages */
        .alert {
            padding: 1rem 1.25rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.success {
            background: var(--success-light);
            color: var(--success);
            border-left: 4px solid var(--success);
        }

        .alert.error {
            background: var(--danger-light);
            color: var(--danger);
            border-left: 4px solid var(--danger);
        }

        .alert.info {
            background: var(--info-light);
            color: var(--info);
            border-left: 4px solid var(--info);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-light);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        /* Week Selector */
        .week-selector {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .week-display {
            flex: 1;
            text-align: center;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Custom Select */
        .form-select {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            background: var(--bg-main);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .form-select:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--bg-card);
            box-shadow: 0 0 0 4px rgba(15, 76, 129, 0.1);
        }

        /* Password Display */
        .password-display {
            background: var(--bg-main);
            padding: 1rem;
            border-radius: 12px;
            border: 2px dashed var(--border);
            font-family: monospace;
            font-size: 1.1rem;
            text-align: center;
            color: var(--primary);
            font-weight: 600;
            margin: 1rem 0;
        }

        /* Firebase Config Notice */
        .config-notice {
            background: var(--warning-light);
            border: 2px solid var(--warning);
            border-radius: 16px;
            padding: 2rem;
            margin: 2rem;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .config-notice h2 {
            color: var(--warning);
            margin-bottom: 1rem;
            font-family: 'Fraunces', serif;
        }

        .config-notice code {
            background: white;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .config-notice pre {
            background: white;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1rem 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .main-content {
                margin-left: 0;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .time-inputs {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ============================================
        // FIREBASE CONFIGURATION
        // ============================================
        // TODO: Replace with your Firebase config from Firebase Console
        const firebaseConfig = {
        apiKey: "AIzaSyC6EinddycUk9j1SBnaaISccLaJ7ttYn9k",
        authDomain: "intern-hour-tracker.firebaseapp.com",
        projectId: "intern-hour-tracker",
        storageBucket: "intern-hour-tracker.firebasestorage.app",
        messagingSenderId: "731283309435",
        appId: "1:731283309435:web:81ee63f4d5b3f00dac33de"
        };
        

        // Initialize Firebase
        let db, auth;
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            db = firebase.firestore();
            auth = firebase.auth();
        } catch (error) {
            console.error("Firebase initialization error:", error);
        }

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        const generatePassword = () => {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#$%';
            let password = '';
            for (let i = 0; i < 12; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return password;
        };

        const generateUsername = (firstName, lastName) => {
            return (lastName + firstName.charAt(0)).toLowerCase();
        };

        const getCurrentWeek = () => {
            const now = new Date();
            const dayOfWeek = now.getDay();
            const diff = now.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1);
            const monday = new Date(now);
            monday.setDate(diff);
            monday.setHours(0, 0, 0, 0);
            return monday;
        };

            return date.toLocaleDateString('en-US', {

                year: 'numeric', 
                month: 'long', 
                day: 'numeric'

        const formatWeekRange = (date) => {
            const monday = new Date(date);
            const sunday = new Date(date);
            sunday.setDate(sunday.getDate() + 6);
            
            return `${monday.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} - ${sunday.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;
        };

        // Format decimal time to 12-hour format with minutes (e.g., 9.75 -> "9:45 AM")
        const formatTimeDisplay = (decimal) => {
            const hour = Math.floor(decimal);
            const minute = Math.round((decimal % 1) * 60);
            const period = hour < 12 ? 'AM' : 'PM';
            const displayHour = hour === 0 ? 12 : hour > 12 ? hour - 12 : hour === 12 ? 12 : hour;
            return `${displayHour}:${minute.toString().padStart(2, '0')} ${period}`;
        };

        // NEW: Convert time string (HH:MM) to decimal hours
        const timeToDecimal = (timeString) => {
            const [hours, minutes] = timeString.split(':').map(Number);
            return hours + (minutes / 60);
        };

        // NEW: Convert decimal hours to time string (HH:MM)
        const decimalToTime = (decimal) => {
            const totalMinutes = Math.round(decimal * 60);
            const hours = Math.floor(totalMinutes / 60);

            return `${hours.toString().padStart(2, '0')}:${minutes

                        auth.currentUser.email,

                    await db.collection('users').doc(currentUser.uid).update({

                        passwordChangedAt: firebase.firestore.FieldValue.serverTimestamp()

                    await auth.currentUser.updatePassword(newPassword);

                    onComplete();

                });

                // Load all time entries for this user
                const unsubscribe = db.collection('timeEntries')
                    .where('userId', '==', userId)

                const entryDate = new Date(entry.date + 'T00:00:00');
                const weekEnd = new Date(currentWeek);
                weekEnd.setDate(weekEnd.getDate() + 7);
                return entryDate >= currentWeek && entryDate < weekEnd;
            });

            const previousWeek = () => {
                const newWeek = new Date(currentWeek);
                newWeek.setDate(newWeek.getDate() - 7);
                setCurrentWeek(newWeek);
            };

            const nextWeek = () => {

                const start = timeToDecimal(editStart);
                const end = timeToDecimal(editEnd);

                    return;

                const hours = end - start;

                    await db.collection('timeEntries').doc(editingEntry.id).update({

                        endTime: end,

                            alert('User and all time entries deleted successfully. Note: Auth account still exists and needs manual deletion from Firebase Console.');

        const ApproveTime = () => {
            const [entries, setEntries] = useState([]);
            const [users, setUsers] = useState([]);
            const [selectedUser, setSelectedUser] = useState('all');
            const [editingEntry, setEditingEntry] = useState(null);
            const [editStart, setEditStart] = useState('');
            const [editEnd, setEditEnd] = useState('');
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                // Load users
                db.collection('users').get().then(snapshot => {
                    const userData = snapshot.docs.map(doc => ({
                        uid: doc.id,
                        ...doc.data()
                    }));
                    setUsers(userData);
                });

                // Load pending entries
                const unsubscribe = db.collection('timeEntries')
                    .where('status', '==', 'pending')
                    // .orderBy('submittedAt', 'desc')
                    .onSnapshot(snapshot => {
                        const entriesData = snapshot.docs.map(doc => ({
                            id: doc.id,
                            ...doc.data()
                        }));
                        setEntries(entriesData);
                        setLoading(false);
                    });

                return () => unsubscribe();
            }, []);

            const filteredEntries = selectedUser === 'all' 
                ? entries 
                : entries.filter(e => e.userId === selectedUser);

            const handleApprove = async (entryId) => {
                try {
                    await db.collection('timeEntries').doc(entryId).update({
                        status: 'approved',
                        approvedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (error) {
                    console.error('Error approving entry:', error);
                }
            };

            const handleReject = async (entryId) => {
                try {
                    await db.collection('timeEntries').doc(entryId).update({
                        status: 'rejected',
                        rejectedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (error) {
                    console.error('Error rejecting entry:', error);
                }
            };

            const handleDelete = async (entryId) => {
                if (confirm('Are you sure you want to delete this entry?')) {
                    try {
                        await db.collection('timeEntries').doc(entryId).delete();
                    } catch (error) {
                        console.error('Error deleting entry:', error);
                    }
                }
            };

            const handleEdit = (entry) => {
                setEditingEntry(entry);
                setEditStart(decimalToTime(entry.startTime));
                setEditEnd(decimalToTime(entry.endTime));
            };

            const handleSaveEdit = async () => {
                const start = timeToDecimal(editStart);
                const end = timeToDecimal(editEnd);

                if (start >= end) {
                    alert('End time must be after start time');
                    return;
                }

                const hours = end - start;
                
                try {
                    await db.collection('timeEntries').doc(editingEntry.id).update({
                        startTime: start,
                        endTime: end,
                        hours: hours,
                        editedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setEditingEntry(null);
                } catch (error) {
                    console.error('Error updating entry:', error);
                    alert('Failed to update entry');
                }
            };
            // Generate time options for edit modal
            const timeOptions = [];
            for (let h = 0; h < 24; h++) {
                timeOptions.push({ value: h, label: formatTimeDisplay(h) });
                timeOptions.push({ value: h + 0.5, label: formatTimeDisplay(h + 0.5) });
            }
            
            const endTimeOptions = [];
            for (let h = 0; h < 24; h++) {
                endTimeOptions.push({ value: h + 0.5, label: formatTimeDisplay(h + 0.5) });
                endTimeOptions.push({ value: h + 1, label: formatTimeDisplay(h + 1) });
            }

            if (loading) return <LoadingScreen />;

            return (

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);

                const username = generateUsername(firstName, lastName);
                const password = generatePassword();

                try {
                    const secondaryApp = firebase.initializeApp(firebaseConfig, 'Secondary');
                    const secondaryAuth = secondaryApp.auth();
                    
                    // Create user with secondary auth instance
                    const userCredential = await secondaryAuth.createUserWithEmailAndPassword(email, password);
                    
                    // Create user profile in Firestore (using main app)
                    await db.collection('users').doc(userCredential.user.uid).set({
                        firstName,
                        lastName,
                        username,
                        email,
                        role,
                        requirePasswordChange: true, // Force password change on first login
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    // Delete the secondary app to clean up
                    await secondaryApp.delete();

                    setGeneratedData({
                        email,
                        username,
                        password
                    });

                    setMessage({ type: 'success', text: 'User created successfully!' });
                    setFirstName('');
                    setLastName('');
                    setRole('user');

                    setTimeout(() => setMessage(null), 5000);
                } catch (error) {
                    console.error('Error creating user:', error);
                    
                    // If error is because secondary app already exists, delete it and retry
                    if (error.code === 'app/duplicate-app') {
                        try {
                            const existingApp = firebase.app('Secondary');
                            await existingApp.delete();
                            // Retry the submission
                            setTimeout(() => handleSubmit(e), 100);
                            return;

        // ============================================
        // AVAILABILITY CALENDAR (User input page)
        // ============================================
        const AvailabilityCalendar = ({ currentUser }) => {
            const getNextWeek = () => {
                const now = new Date();
                const dayOfWeek = now.getDay();
                const diff = now.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1) + 7;
                const monday = new Date(now);
                monday.setDate(diff);
                monday.setHours(0, 0, 0, 0);
                return monday;
            };

            const [selectedWeek, setSelectedWeek] = useState(getNextWeek);
            const [availability, setAvailability] = useState({});
            const [loading, setLoading] = useState(false);
            const [saving, setSaving] = useState(false);
            const [message, setMessage] = useState(null);
            const [inputDay, setInputDay] = useState('monday');
            const [inputStart, setInputStart] = useState('08:00');
            const [inputEnd, setInputEnd] = useState('17:00');
            const [editMode, setEditMode] = useState(false);

            const DAYS = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'];
            const DAY_LABELS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            const HOURS = Array.from({ length: 19 }, (_, i) => 8 + i * 0.5);

            const weekStartStr = selectedWeek.toLocaleDateString('en-CA');
            const docId = `${currentUser.uid}_${weekStartStr}`;

            useEffect(() => {
                setLoading(true);
                db.collection('availability').doc(docId).get().then(doc => {
                    setAvailability(doc.exists ? (doc.data().days || {}) : {});
                    setLoading(false);
                }).catch(() => setLoading(false));
            }, [docId]);

            const toggleSlot = (day, hour) => {
                setAvailability(prev => {
                    const slots = prev[day] || [];
                    const updated = slots.includes(hour)
                        ? slots.filter(h => h !== hour)
                        : [...slots, hour].sort((a, b) => a - b);
                    return { ...prev, [day]: updated };
                });
            };

            const handleSave = async () => {
                setSaving(true);
                try {
                    await db.collection('availability').doc(docId).set({
                        userId: currentUser.uid,
                        userName: `${currentUser.firstName} ${currentUser.lastName}`,
                        weekStart: weekStartStr,
                        days: availability,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setMessage({ type: 'success', text: 'Availability saved!' });
                    setTimeout(() => setMessage(null), 3000);
                } catch (error) {
                    console.error(error);
                    setMessage({ type: 'error', text: 'Failed to save availability' });
                } finally {
                    setSaving(false);
                }
            };

            const formatHour = (hour) => {
                const wholeHour = Math.floor(hour);
                const minutes = hour % 1 === 0.5 ? '30' : '00';
                const period = wholeHour < 12 ? 'AM' : 'PM';
                const displayHour = wholeHour > 12 ? wholeHour - 12 : wholeHour === 0 ? 12 : wholeHour;
                return `${displayHour}:${minutes}${period}`;
            };

            const getDayDate = (dayIndex) => {
                const date = new Date(selectedWeek);
                date.setDate(date.getDate() + dayIndex);
                return date.getDate();
            };

            const addSlots = () => {
                const start = timeToDecimal(inputStart);
                const end = timeToDecimal(inputEnd);
                if (start >= end) return;
                setAvailability(prev => {
                    const slots = prev[inputDay] || [];
                    const newSlots = [...slots];
                    for (let h = Math.ceil(start * 2) / 2; h < end; h += 0.5) {
                        if (!newSlots.includes(h)) newSlots.push(h);
                    }
                    return { ...prev, [inputDay]: newSlots.sort((a, b) => a - b) };
                });
            };

            const removeSlots = () => {
                const start = timeToDecimal(inputStart);
                const end = timeToDecimal(inputEnd);
                if (start >= end) return;
                setAvailability(prev => {
                    const slots = prev[inputDay] || [];
                    const updated = slots.filter(h => h < start || h >= end);
                    return { ...prev, [inputDay]: updated };
                });
            };

            return (
                <div className="main-content">
                    <div className="main-header">
                        <h1>My Availability</h1>
                        <p>Set your availability for the upcoming week</p>
                    </div>

                    <div className="main-body">
                        {/* ── Input card ── */}
                        <div className="content-card" style={{ marginBottom: '1.5rem' }}>
                            <div style={{ marginBottom: '1rem' }}>
                                <h3 style={{ fontSize: '1rem', fontWeight: '600', color: 'var(--text-primary)', marginBottom: '0.25rem' }}>Add Availability</h3>
                                <p style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>Select a day and time range, then click Add.</p>
                            </div>
                            <div style={{ display: 'flex', gap: '0.75rem', flexWrap: 'wrap', alignItems: 'flex-end' }}>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '0.35rem', minWidth: '130px' }}>
                                    <label style={{ fontSize: '0.75rem', fontWeight: '600', color: 'var(--text-secondary)' }}>Day</label>
                                    <select
                                        className="form-select"
                                        style={{ padding: '0.6rem 0.875rem', fontSize: '0.9rem' }}
                                        value={inputDay}
                                        onChange={e => setInputDay(e.target.value)}
                                    >
                                        {DAYS.map((d, i) => (
                                            <option key={d} value={d}>{DAY_LABELS[i]}</option>
                                        ))}
                                    </select>
                                </div>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '0.35rem', minWidth: '130px' }}>
                                    <label style={{ fontSize: '0.75rem', fontWeight: '600', color: 'var(--text-secondary)' }}>From</label>
                                    <input
                                        type="time"
                                        className="form-input"
                                        style={{ padding: '0.6rem 0.875rem', fontSize: '0.9rem' }}
                                        value={inputStart}
                                        onChange={e => setInputStart(e.target.value)}
                                        min="08:00"
                                        max="17:00"
                                    />
                                </div>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '0.35rem', minWidth: '130px' }}>
                                    <label style={{ fontSize: '0.75rem', fontWeight: '600', color: 'var(--text-secondary)' }}>To</label>
                                    <input
                                        type="time"
                                        className="form-input"
                                        style={{ padding: '0.6rem 0.875rem', fontSize: '0.9rem' }}
                                        value={inputEnd}
                                        onChange={e => setInputEnd(e.target.value)}
                                        min="08:00"
                                        max="17:00"
                                    />
                                </div>
                                <div style={{ display: 'flex', gap: '0.5rem' }}>
                                    <button
                                        className="btn btn-success"
                                        onClick={addSlots}
                                        disabled={inputStart >= inputEnd}
                                        style={{ padding: '0.6rem 1.25rem', fontSize: '0.9rem' }}
                                    >
                                        <Icon name="plus" size={16} />&nbsp;Add
                                    </button>
                                    <button
                                        className="btn btn-danger"
                                        onClick={removeSlots}
                                        disabled={inputStart >= inputEnd}
                                        style={{ padding: '0.6rem 1.25rem', fontSize: '0.9rem' }}
                                    >
                                        <Icon name="x" size={16} />&nbsp;Remove
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* ── Calendar card ── */}
                        <div className="content-card">
                            <div className="week-selector">
                                <button className="icon-btn" onClick={() => {
                                    const d = new Date(selectedWeek); d.setDate(d.getDate() - 7); setSelectedWeek(d);
                                }}>
                                    <Icon name="chevronLeft" size={20} />
                                </button>
                                <div className="week-display">{formatWeekRange(selectedWeek)}</div>
                                <button className="icon-btn" onClick={() => {
                                    const d = new Date(selectedWeek); d.setDate(d.getDate() + 7); setSelectedWeek(d);
                                }}>
                                    <Icon name="chevronRight" size={20} />
                                </button>
                                <button
                                    className={`btn ${editMode ? 'btn-primary' : 'btn-secondary'}`}
                                    onClick={() => setEditMode(e => !e)}
                                    style={{ marginLeft: '0.5rem', padding: '0.4rem 1rem', fontSize: '0.85rem' }}
                                >
                                    {editMode ? <><Icon name="check" size={15} />&nbsp;Done</> : <><Icon name="edit" size={15} />&nbsp;Edit</>}
                                </button>
                            </div>

                            {message && (
                                <div className={`alert ${message.type}`}>
                                    <Icon name={message.type === 'success' ? 'checkCircle' : 'alertCircle'} size={20} />
                                    {message.text}
                                </div>
                            )}

                            {loading ? (
                                <div className="empty-state">
                                    <div className="spinner" style={{ margin: '0 auto' }}></div>
                                </div>
                            ) : (
                                <>
                                    {editMode && (
                                        <p style={{ marginBottom: '0.75rem', fontSize: '0.85rem', color: 'var(--text-secondary)' }}>
                                            Click a slot to remove it. Press <strong>Done</strong> when finished.
                                        </p>
                                    )}
                                    <div style={{ overflowX: 'auto' }}>
                                        <div style={{
                                            display: 'grid',
                                            gridTemplateColumns: '52px repeat(7, 1fr)',
                                            gap: '0',
                                            minWidth: '560px'
                                        }}>
                                            <div />
                                            {DAYS.map((day, i) => (
                                                <div key={day} style={{
                                                    textAlign: 'center', padding: '0.5rem 0.25rem',
                                                    fontWeight: '600', fontSize: '0.8rem',
                                                    color: 'var(--text-secondary)', background: 'var(--bg-main)', borderRadius: '6px',
                                                    margin: '0 1px 2px 1px'
                                                }}>
                                                    <div>{DAY_LABELS[i]}</div>
                                                    <div style={{ fontSize: '0.7rem', color: 'var(--text-light)' }}>{getDayDate(i)}</div>
                                                </div>
                                            ))}
                                            {HOURS.map(hour => (
                                                <React.Fragment key={hour}>
                                                    <div style={{
                                                        fontSize: '0.7rem', color: 'var(--text-light)',
                                                        display: 'flex', alignItems: 'flex-start',
                                                        justifyContent: 'flex-end', paddingRight: '6px', paddingTop: '3px'
                                                    }}>{formatHour(hour)}</div>
                                                    {DAYS.map(day => {
                                                        const selected = (availability[day] || []).includes(hour);
                                                        const prevSelected = (availability[day] || []).includes(hour - 0.5);
                                                        const nextSelected = (availability[day] || []).includes(hour + 0.5);
                                                        const isFirst = selected && !prevSelected;
                                                        const isLast = selected && !nextSelected;

                                                        let borderRadius = '3px';
                                                        if (selected) {
                                                            if (isFirst && isLast) borderRadius = '4px';
                                                            else if (isFirst) borderRadius = '4px 4px 0 0';
                                                            else if (isLast) borderRadius = '0 0 4px 4px';
                                                            else borderRadius = '0';
                                                        }

                                                        return (
                                                            <div
                                                                key={`${day}-${hour}`}
                                                                onClick={() => editMode && selected && toggleSlot(day, hour)}
                                                                style={{
                                                                    height: '32px',
                                                                    borderRadius,
                                                                    background: selected ? (editMode ? 'var(--success-light)' : 'var(--success)') : 'var(--bg-main)',
                                                                    borderTop: selected && prevSelected ? 'none' : `1px solid ${selected ? 'var(--success)' : 'var(--border-light)'}`,
                                                                    borderBottom: selected && nextSelected ? 'none' : `1px solid ${selected ? 'var(--success)' : 'var(--border-light)'}`,
                                                                    borderLeft: `1px solid ${selected ? 'var(--success)' : 'var(--border-light)'}`,
                                                                    borderRight: `1px solid ${selected ? 'var(--success)' : 'var(--border-light)'}`,
                                                                    transition: 'background 0.15s ease',
                                                                    cursor: editMode && selected ? 'pointer' : 'default',
                                                                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                                                                    position: 'relative'
                                                                }}
                                                                onMouseEnter={e => {
                                                                    if (editMode && selected) {
                                                                        e.currentTarget.style.background = 'var(--success)';
                                                                        const icon = e.currentTarget.querySelector('.delete-icon');
                                                                        if (icon) icon.style.opacity = '1';
                                                                    }
                                                                }}
                                                                onMouseLeave={e => {
                                                                    if (editMode && selected) {
                                                                        e.currentTarget.style.background = 'var(--success-light)';
                                                                        const icon = e.currentTarget.querySelector('.delete-icon');
                                                                        if (icon) icon.style.opacity = '0';
                                                                    }
                                                                }}
                                                            >
                                                                {editMode && selected && (
                                                                    <span className="delete-icon" style={{
                                                                        opacity: 0,
                                                                        transition: 'opacity 0.15s ease',
                                                                        color: 'white',
                                                                        fontSize: '0.75rem',
                                                                        fontWeight: '700',
                                                                        pointerEvents: 'none',
                                                                        lineHeight: 1
                                                                    }}>✕</span>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </React.Fragment>
                                            ))}
                                        </div>
                                    </div>

                                    <div style={{ marginTop: '1.5rem', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: '1rem' }}>
                                        <div style={{ display: 'flex', gap: '1rem', fontSize: '0.85rem', color: 'var(--text-secondary)', alignItems: 'center' }}>
                                            <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                                <div style={{ width: '14px', height: '14px', background: 'var(--success)', borderRadius: '3px' }} />
                                                Available
                                            </div>
                                            <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                                <div style={{ width: '14px', height: '14px', background: 'var(--bg-main)', border: '1px solid var(--border-light)', borderRadius: '3px' }} />
                                                Unavailable
                                            </div>
                                        </div>
                                        <button className="btn btn-success" onClick={handleSave} disabled={saving} style={{ minWidth: '160px' }}>
                                            {saving
                                                ? <><div className="spinner" />&nbsp;Saving...</>
                                                : <><Icon name="check" size={18} />&nbsp;Save Availability</>
                                            }
                                        </button>
                                    </div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================
        // MAIN APP COMPONENT
        // ============================================
        const App = () => {
            const [currentUser, setCurrentUser] = useState(null);
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [loading, setLoading] = useState(true);
            const [showPasswordChange, setShowPasswordChange] = useState(false);

            useEffect(() => {
                // Check if Firebase is configured
                if (!isFirebaseConfigured()) {
                    setLoading(false);
                    return;
                }

                // Check for auth state
                const unsubscribe = auth.onAuthStateChanged(async (user) => {
                    if (user) {
                        try {
                            const userDoc = await db.collection('users').doc(user.uid).get();
                            if (userDoc.exists) {
                                const userData = {
                                    uid: user.uid,
                                    ...userDoc.data()
                                };
                                setCurrentUser(userData);
                                
                                // Check if password change is required (only for non-admin users)
                                if (userData.requirePasswordChange && userData.role !== 'admin') {
                                    setShowPasswordChange(true);
                                }
                            }
                        } catch (error) {
                            console.error('Error loading user:', error);
                        }
                    }
                    setLoading(false);
                });

                return () => unsubscribe();
            }, []);

            const handleLogin = (user) => {
                setCurrentUser(user);
                if (user.requirePasswordChange && user.role !== 'admin') {
                    setShowPasswordChange(true);
                }
            };

            const handleLogout = () => {
                setCurrentUser(null);
                setCurrentPage('dashboard');
                setShowPasswordChange(false);
            };


            const handlePasswordChangeComplete = async () => {
            try {
                const userDoc = await db.collection('users').doc(currentUser.uid).get();

                if (userDoc.exists) {
                    const updatedUser = {
                        uid: currentUser.uid,
                        ...userDoc.data(),
                        requirePasswordChange: false // force override locally
                    };

                    setCurrentUser(updatedUser);
                }

                // IMPORTANT: force close modal BEFORE anything else
                setShowPasswordChange(false);

            } catch (error) {
                console.error('Error refreshing user after password change:', error);
            }
        };

            if (!isFirebaseConfigured()) {
                return <ConfigNotice />;
            }

            if (loading) {
                return <LoadingScreen />;
            }

            if (!currentUser) {
                return <LoginPage onLogin={handleLogin} />;
            }

            // Show password change modal if required
            if (showPasswordChange) {
                return (
                    <div className="app-container">
                        <Sidebar 
                            currentUser={currentUser} 
                            currentPage={currentPage}
                            onNavigate={setCurrentPage}
                            onLogout={handleLogout}
                        />
                        <PasswordChangeModal 
                            currentUser={currentUser}
                            onComplete={handlePasswordChangeComplete}
                        />
                    </div>
                );
            }

            return (
                <div className="app-container">
                    <Sidebar 
                        currentUser={currentUser} 
                        currentPage={currentPage}
                        onNavigate={setCurrentPage}
                        onLogout={handleLogout}
                    />

                    {currentPage === 'dashboard' && (
                        <Dashboard currentUser={currentUser} />
                    )}

                    {currentPage === 'clock' && (
                        currentUser.role === 'admin'
                            ? <AdminLogTime />
                            : <TimeClock currentUser={currentUser} onNavigate={setCurrentPage} />
                    )}

                    {currentPage === 'profile' && (
                        <Profile currentUser={currentUser} />
                    )}

                    {currentPage === 'manage-users' && currentUser.role === 'admin' && (
                        <ManageUsers />
                    )}

                    {currentPage === 'approve-time' && currentUser.role === 'admin' && (
                        <ApproveTime />
                    )}

                    {currentPage === 'create-user' && currentUser.role === 'admin' && (
                        <CreateUser />
                    )}

                    {currentPage === 'availability' && currentUser.role !== 'admin' && (
                        <AvailabilityCalendar currentUser={currentUser} />
                    )}
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
